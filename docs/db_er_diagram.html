<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=er_explorer/index.html">
  <title>Factory App ER Explorer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --panel: #ffffff;
      --line: #dbe3ef;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    main {
      width: min(520px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 16px 40px rgba(15, 23, 42, .08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Factory App ER Explorer</h1>
    <p>The original Mermaid page is too large for Mermaid's renderer. Redirecting to the split SVG explorer.</p>
    <a href="er_explorer/index.html">Open ER Explorer</a>
  </main>
  <script>
    window.location.replace("er_explorer/index.html");
  </script>
</body>
</html>
