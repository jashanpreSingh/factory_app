<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <style>
    .page-title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #475569; }
    .card-title { font: 700 15px "Segoe UI", Arial, sans-serif; }
    .field { font: 12px Consolas, "Liberation Mono", monospace; fill: #1f2937; }
    .meta { font: 12px "Segoe UI", Arial, sans-serif; fill: #64748b; }
    .section { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #334155; }
    .card { transition: opacity .12s ease; }
    .card-outline { transition: stroke .12s ease, stroke-width .12s ease; }
    .card.active-card .card-outline { stroke: #ef4444; stroke-width: 4; }
    .relation { cursor: pointer; }
    .overview-app { cursor: pointer; }
    .overview-app:hover .overview-outline { stroke-width: 4; }
    .edge-hit { stroke: transparent; stroke-width: 18; fill: none; pointer-events: stroke; }
    .edge { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); opacity: .62; }
    .external-edge { stroke: #475569; opacity: .58; }
    .relation.active .edge { stroke: #ef4444; stroke-width: 4; marker-end: url(#arrow-active); opacity: 1; }
    .relation.active .edge-label-bg { stroke: #ef4444; stroke-width: 1.5; opacity: 1; }
    .relation.active .edge-label { fill: #b91c1c; font-weight: 700; }
    .edge-label-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; opacity: .9; }
    .edge-label { font: 10px "Segoe UI", Arial, sans-serif; fill: #475569; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="60" y="54" class="page-title">Django Apscheduler ER Slice</text>
  <text x="60" y="80" class="subtitle">2 local tables, 0 linked external tables, 1 local relationships, 0 external relationships</text>
  <g class="relation" data-src="django_apscheduler_djangojob" data-dst="django_apscheduler_djangojobexecution" data-label="job_id">
    <title>django_apscheduler_djangojob to django_apscheduler_djangojobexecution via job_id</title>
    <path class="edge-hit" d="M 230 188 L 190 188 L 190 389 L 230 389"/>
    <path class="edge" d="M 230 188 L 190 188 L 190 389 L 230 389"/>
    <rect class="edge-label-bg" x="166.0" y="280.5" width="48" height="16" rx="4"/>
    <text class="edge-label" x="190.0" y="292.5" text-anchor="middle">job_id</text>
  </g>

  <g id="django_apscheduler_djangojob" class="card" data-table="django_apscheduler_djangojob">
    <title>django_apscheduler_djangojob</title>
    <rect class="card-outline" x="230" y="132" width="320" height="112" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="1.5"/>
    <rect x="230" y="132" width="320" height="34" rx="8" fill="#cffafe" stroke="#0891b2" stroke-width="1"/>
    <rect x="230" y="158" width="320" height="8" fill="#cffafe"/>
    <text x="244" y="154" class="card-title" fill="#0891b2">django_apscheduler_djangojob</text>
    <text x="244" y="190" class="field">PK    id : varchar</text>
    <text x="244" y="208" class="field">      next_run_time : datetime (nullable)</text>
    <text x="244" y="226" class="field">      job_state : binary</text>
  </g>
  <g id="django_apscheduler_djangojobexecution" class="card" data-table="django_apscheduler_djangojobexecution">
    <title>django_apscheduler_djangojobexecution</title>
    <rect class="card-outline" x="230" y="288" width="320" height="202" rx="8" fill="#ffffff" stroke="#0891b2" stroke-width="1.5"/>
    <rect x="230" y="288" width="320" height="34" rx="8" fill="#cffafe" stroke="#0891b2" stroke-width="1"/>
    <rect x="230" y="314" width="320" height="8" fill="#cffafe"/>
    <text x="244" y="310" class="card-title" fill="#0891b2">django_apscheduler_djangojobexecution</text>
    <text x="244" y="346" class="field">PK    id : bigint</text>
    <text x="244" y="364" class="field">      status : varchar</text>
    <text x="244" y="382" class="field">      run_time : datetime</text>
    <text x="244" y="400" class="field">      duration : decimal (nullable)</text>
    <text x="244" y="418" class="field">      finished : decimal (nullable)</text>
    <text x="244" y="436" class="field">      exception : varchar (nullable)</text>
    <text x="244" y="454" class="field">      traceback : text (nullable)</text>
    <text x="244" y="472" class="field">FK    job_id : varchar</text>
  </g>

  <script><![CDATA[
    (function () {
      const svg = document.currentScript.ownerSVGElement;
      if (!svg || svg.dataset.erInteractive === "1") return;
      svg.dataset.erInteractive = "1";
      const relations = Array.from(svg.querySelectorAll(".relation"));
      const cards = Array.from(svg.querySelectorAll(".card"));

      function clear() {
        relations.forEach((relation) => relation.classList.remove("active"));
        cards.forEach((card) => card.classList.remove("active-card"));
      }

      function highlight(relation) {
        const src = relation.dataset.src;
        const dst = relation.dataset.dst;
        relations.forEach((item) => {
          item.classList.toggle("active", item === relation);
        });
        cards.forEach((card) => {
          const connected = card.dataset.table === src || card.dataset.table === dst;
          card.classList.toggle("active-card", connected);
        });
      }

      relations.forEach((relation) => {
        relation.addEventListener("click", (event) => {
          event.stopPropagation();
          highlight(relation);
        });
      });
      svg.addEventListener("click", clear);
    })();
  ]]></script>

</svg>
