    <rect class="card-outline" x="230" y="486" width="320" height="202" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <rect x="230" y="486" width="320" height="34" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
    <rect x="230" y="512" width="320" height="8" fill="#e2e8f0"/>
    <text x="244" y="508" class="card-title" fill="#475569">notifications_userdevice</text>
