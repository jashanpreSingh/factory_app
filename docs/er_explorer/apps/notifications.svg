    <text x="244" y="616" class="field">      is_active : boolean</text>
    <text x="244" y="634" class="field">      created_at : datetime</text>
    <text x="244" y="652" class="field">      last_used_at : datetime</text>
    <text x="244" y="670" class="field">      user_id : int</text>
  </g>
  <g id="company_company" class="card" data-table="company_company">
    <title>company_company</title>
    <rect class="card-outline" x="990" y="132" width="260" height="130" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="990" y="132" width="260" height="34" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="990" y="158" width="260" height="8" fill="#e2e8f0"/>
    <text x="1004" y="154" class="card-title" fill="#94a3b8">company_company</text>
    <text x="1236" y="154" class="meta" text-anchor="end">company</text>
    <text x="1004" y="190" class="field">PK    id : int</text>
    <text x="1004" y="208" class="field">      name : varchar</text>
    <text x="1004" y="226" class="field">UK    code : varchar</text>
    <text x="1004" y="244" class="field">      is_active : boolean</text>
  </g>

  <script><![CDATA[
    (function () {
      const svg = document.currentScript.ownerSVGElement;
      if (!svg || svg.dataset.erInteractive === "1") return;
      svg.dataset.erInteractive = "1";
      const relations = Array.from(svg.querySelectorAll(".relation"));
      const cards = Array.from(svg.querySelectorAll(".card"));

      function clear() {
        relations.forEach((relation) => relation.classList.remove("active"));
        cards.forEach((card) => card.classList.remove("active-card"));
      }

      function highlight(relation) {
        const src = relation.dataset.src;
        const dst = relation.dataset.dst;
        relations.forEach((item) => {
          item.classList.toggle("active", item === relation);
        });
        cards.forEach((card) => {
          const connected = card.dataset.table === src || card.dataset.table === dst;
          card.classList.toggle("active-card", connected);
        });
      }

      relations.forEach((relation) => {
        relation.addEventListener("click", (event) => {
          event.stopPropagation();
          highlight(relation);
        });
      });
      svg.addEventListener("click", clear);
    })();
  ]]></script>

</svg>
