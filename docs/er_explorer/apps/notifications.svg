    <title>notifications_notification</title>
    <rect class="card-outline" x="230" y="132" width="320" height="310" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <rect x="230" y="132" width="320" height="34" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
    <rect x="230" y="158" width="320" height="8" fill="#e2e8f0"/>
    <text x="244" y="154" class="card-title" fill="#475569">notifications_notification</text>
    <text x="244" y="190" class="field">PK    id : bigint</text>
    <text x="244" y="208" class="field">      title : varchar</text>
    <text x="244" y="226" class="field">      body : text</text>
    <text x="244" y="244" class="field">      notification_type : varchar</text>
    <text x="244" y="262" class="field">      click_action_url : varchar</text>
    <text x="244" y="280" class="field">      reference_type : varchar</text>
    <text x="244" y="298" class="field">      reference_id : int (nullable)</text>
    <text x="244" y="316" class="field">      is_read : boolean</text>
    <text x="244" y="334" class="field">      read_at : datetime (nullable)</text>
    <text x="244" y="352" class="field">      extra_data : json</text>
    <text x="244" y="370" class="field">      created_at : datetime</text>
    <text x="244" y="388" class="field">FK    company_id : int (nullable)</text>
    <text x="244" y="406" class="field">      created_by_id : int (nullable)</text>
    <text x="244" y="424" class="field">      recipient_id : int</text>
