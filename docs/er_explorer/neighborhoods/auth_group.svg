<svg xmlns="http://www.w3.org/2000/svg" width="1330" height="720" viewBox="0 0 1330 720">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <style>
    .page-title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #475569; }
    .card-title { font: 700 15px "Segoe UI", Arial, sans-serif; }
    .field { font: 12px Consolas, "Liberation Mono", monospace; fill: #1f2937; }
    .meta { font: 12px "Segoe UI", Arial, sans-serif; fill: #64748b; }
    .section { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #334155; }
    .card { transition: opacity .12s ease; }
    .card-outline { transition: stroke .12s ease, stroke-width .12s ease; }
    .card.active-card .card-outline { stroke: #ef4444; stroke-width: 4; }
    .relation { cursor: pointer; }
    .overview-app { cursor: pointer; }
    .overview-app:hover .overview-outline { stroke-width: 4; }
    .edge-hit { stroke: transparent; stroke-width: 18; fill: none; pointer-events: stroke; }
    .edge { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); opacity: .62; }
    .external-edge { stroke: #475569; opacity: .58; }
    .relation.active .edge { stroke: #ef4444; stroke-width: 4; marker-end: url(#arrow-active); opacity: 1; }
    .relation.active .edge-label-bg { stroke: #ef4444; stroke-width: 1.5; opacity: 1; }
    .relation.active .edge-label { fill: #b91c1c; font-weight: 700; }
    .edge-label-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; opacity: .9; }
    .edge-label { font: 10px "Segoe UI", Arial, sans-serif; fill: #475569; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="60" y="54" class="page-title">auth_group Neighborhood</text>
  <text x="60" y="80" class="subtitle">0 parent/lookup tables, 2 child tables, 2 direct relationships</text>
  <text x="1000" y="126" class="section">Children and dependents</text>
  <g class="relation" data-src="auth_group" data-dst="accounts_user_groups" data-label="group_id">
    <title>auth_group to accounts_user_groups via group_id</title>
    <path class="edge-hit" d="M 820 344 L 838 344 L 838 206 L 1000 206"/>
    <path class="edge" d="M 820 344 L 838 344 L 838 206 L 1000 206"/>
    <rect class="edge-label-bg" x="811.0" y="198.0" width="60" height="16" rx="4"/>
    <text class="edge-label" x="841.0" y="210.0" text-anchor="middle">group_id</text>
  </g>
  <g class="relation" data-src="auth_group" data-dst="auth_group_permissions" data-label="group_id">
    <title>auth_group to auth_group_permissions via group_id</title>
    <path class="edge-hit" d="M 820 376 L 844 376 L 844 348 L 1000 348"/>
    <path class="edge" d="M 820 376 L 844 376 L 844 348 L 1000 348"/>
    <rect class="edge-label-bg" x="866.0" y="340.0" width="60" height="16" rx="4"/>
    <text class="edge-label" x="896.0" y="352.0" text-anchor="middle">group_id</text>
  </g>
  <g id="auth_group" class="card" data-table="auth_group">
    <title>auth_group</title>
    <rect class="card-outline" x="500" y="313" width="320" height="94" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <rect x="500" y="313" width="320" height="34" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1"/>
    <rect x="500" y="339" width="320" height="8" fill="#bfdbfe"/>
    <text x="514" y="335" class="card-title" fill="#0f172a">auth_group</text>
    <text x="514" y="371" class="field">PK    id : int</text>
    <text x="514" y="389" class="field">UK    name : varchar</text>
  </g>
  <g id="accounts_user_groups" class="card" data-table="accounts_user_groups">
    <title>accounts_user_groups</title>
    <rect class="card-outline" x="1000" y="150" width="260" height="112" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="1000" y="150" width="260" height="34" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="1000" y="176" width="260" height="8" fill="#e2e8f0"/>
    <text x="1014" y="172" class="card-title" fill="#94a3b8">accounts_user_groups</text>
    <text x="1246" y="172" class="meta" text-anchor="end">accounts</text>
    <text x="1014" y="208" class="field">PK    id : bigint</text>
    <text x="1014" y="226" class="field">FK    user_id : bigint</text>
    <text x="1014" y="244" class="field">FK    group_id : int</text>
  </g>
  <g id="auth_group_permissions" class="card" data-table="auth_group_permissions">
    <title>auth_group_permissions</title>
    <rect class="card-outline" x="1000" y="292" width="260" height="112" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="1000" y="292" width="260" height="34" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="1000" y="318" width="260" height="8" fill="#e2e8f0"/>
    <text x="1014" y="314" class="card-title" fill="#94a3b8">auth_group_permissions</text>
    <text x="1246" y="314" class="meta" text-anchor="end">auth</text>
    <text x="1014" y="350" class="field">PK    id : int</text>
    <text x="1014" y="368" class="field">FK    group_id : int</text>
    <text x="1014" y="386" class="field">FK    permission_id : int</text>
  </g>

  <script><![CDATA[
    (function () {
      const svg = document.currentScript.ownerSVGElement;
      if (!svg || svg.dataset.erInteractive === "1") return;
      svg.dataset.erInteractive = "1";
      const relations = Array.from(svg.querySelectorAll(".relation"));
      const cards = Array.from(svg.querySelectorAll(".card"));

      function clear() {
        relations.forEach((relation) => relation.classList.remove("active"));
        cards.forEach((card) => card.classList.remove("active-card"));
      }

      function highlight(relation) {
        const src = relation.dataset.src;
        const dst = relation.dataset.dst;
        relations.forEach((item) => {
          item.classList.toggle("active", item === relation);
        });
        cards.forEach((card) => {
          const connected = card.dataset.table === src || card.dataset.table === dst;
          card.classList.toggle("active-card", connected);
        });
      }

      relations.forEach((relation) => {
        relation.addEventListener("click", (event) => {
          event.stopPropagation();
          highlight(relation);
        });
      });
      svg.addEventListener("click", clear);
    })();
  ]]></script>

</svg>
