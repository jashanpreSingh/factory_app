<svg xmlns="http://www.w3.org/2000/svg" width="1070" height="720" viewBox="0 0 1070 720">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <style>
    .page-title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #475569; }
    .card-title { font: 700 15px "Segoe UI", Arial, sans-serif; }
    .field { font: 12px Consolas, "Liberation Mono", monospace; fill: #1f2937; }
    .meta { font: 12px "Segoe UI", Arial, sans-serif; fill: #64748b; }
    .section { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #334155; }
    .card { transition: opacity .12s ease; }
    .card-outline { transition: stroke .12s ease, stroke-width .12s ease; }
    .card.active-card .card-outline { stroke: #ef4444; stroke-width: 4; }
    .relation { cursor: pointer; }
    .overview-app { cursor: pointer; }
    .overview-app:hover .overview-outline { stroke-width: 4; }
    .edge-hit { stroke: transparent; stroke-width: 18; fill: none; pointer-events: stroke; }
    .edge { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); opacity: .62; }
    .external-edge { stroke: #475569; opacity: .58; }
    .relation.active .edge { stroke: #ef4444; stroke-width: 4; marker-end: url(#arrow-active); opacity: 1; }
    .relation.active .edge-label-bg { stroke: #ef4444; stroke-width: 1.5; opacity: 1; }
    .relation.active .edge-label { fill: #b91c1c; font-weight: 700; }
    .edge-label-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; opacity: .9; }
    .edge-label { font: 10px "Segoe UI", Arial, sans-serif; fill: #475569; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="60" y="54" class="page-title">auth_group_permissions Neighborhood</text>
  <text x="60" y="80" class="subtitle">2 parent/lookup tables, 0 child tables, 2 direct relationships</text>
  <text x="60" y="126" class="section">Parents and lookups</text>
  <g class="relation" data-src="auth_group" data-dst="auth_group_permissions" data-label="group_id">
    <title>auth_group to auth_group_permissions via group_id</title>
    <path class="edge-hit" d="M 320 357 L 338 357 L 338 379 L 500 379"/>
    <path class="edge" d="M 320 357 L 338 357 L 338 379 L 500 379"/>
    <rect class="edge-label-bg" x="369.0" y="371.0" width="60" height="16" rx="4"/>
    <text class="edge-label" x="399.0" y="383.0" text-anchor="middle">group_id</text>
  </g>
  <g class="relation" data-src="auth_permission" data-dst="auth_group_permissions" data-label="permission_id">
    <title>auth_permission to auth_group_permissions via permission_id</title>
    <path class="edge-hit" d="M 320 215 L 482 215 L 482 341 L 500 341"/>
    <path class="edge" d="M 320 215 L 482 215 L 482 341 L 500 341"/>
    <rect class="edge-label-bg" x="428.0" y="207.0" width="90" height="16" rx="4"/>
    <text class="edge-label" x="473.0" y="219.0" text-anchor="middle">permission_id</text>
  </g>
  <g id="auth_permission" class="card" data-table="auth_permission">
    <title>auth_permission</title>
    <rect class="card-outline" x="60" y="150" width="260" height="130" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="60" y="150" width="260" height="34" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="60" y="176" width="260" height="8" fill="#e2e8f0"/>
    <text x="74" y="172" class="card-title" fill="#94a3b8">auth_permission</text>
    <text x="306" y="172" class="meta" text-anchor="end">auth</text>
    <text x="74" y="208" class="field">PK    id : int</text>
    <text x="74" y="226" class="field">      name : varchar</text>
    <text x="74" y="244" class="field">FK    content_type_id : int</text>
    <text x="74" y="262" class="field">      codename : varchar</text>
  </g>
  <g id="auth_group" class="card" data-table="auth_group">
    <title>auth_group</title>
    <rect class="card-outline" x="60" y="310" width="260" height="94" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="60" y="310" width="260" height="34" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="60" y="336" width="260" height="8" fill="#e2e8f0"/>
    <text x="74" y="332" class="card-title" fill="#94a3b8">auth_group</text>
    <text x="306" y="332" class="meta" text-anchor="end">auth</text>
    <text x="74" y="368" class="field">PK    id : int</text>
    <text x="74" y="386" class="field">UK    name : varchar</text>
  </g>
  <g id="auth_group_permissions" class="card" data-table="auth_group_permissions">
    <title>auth_group_permissions</title>
    <rect class="card-outline" x="500" y="304" width="320" height="112" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <rect x="500" y="304" width="320" height="34" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1"/>
    <rect x="500" y="330" width="320" height="8" fill="#bfdbfe"/>
    <text x="514" y="326" class="card-title" fill="#0f172a">auth_group_permissions</text>
    <text x="514" y="362" class="field">PK    id : int</text>
    <text x="514" y="380" class="field">FK    group_id : int</text>
    <text x="514" y="398" class="field">FK    permission_id : int</text>
  </g>

  <script><![CDATA[
    (function () {
      const svg = document.currentScript.ownerSVGElement;
      if (!svg || svg.dataset.erInteractive === "1") return;
      svg.dataset.erInteractive = "1";
      const relations = Array.from(svg.querySelectorAll(".relation"));
      const cards = Array.from(svg.querySelectorAll(".card"));

      function clear() {
        relations.forEach((relation) => relation.classList.remove("active"));
        cards.forEach((card) => card.classList.remove("active-card"));
      }

      function highlight(relation) {
        const src = relation.dataset.src;
        const dst = relation.dataset.dst;
        relations.forEach((item) => {
          item.classList.toggle("active", item === relation);
        });
        cards.forEach((card) => {
          const connected = card.dataset.table === src || card.dataset.table === dst;
          card.classList.toggle("active-card", connected);
        });
      }

      relations.forEach((relation) => {
        relation.addEventListener("click", (event) => {
          event.stopPropagation();
          highlight(relation);
        });
      });
      svg.addEventListener("click", clear);
    })();
  ]]></script>

</svg>
