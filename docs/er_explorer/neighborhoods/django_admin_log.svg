<svg xmlns="http://www.w3.org/2000/svg" width="1070" height="720" viewBox="0 0 1070 720">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <style>
    .page-title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #475569; }
    .card-title { font: 700 15px "Segoe UI", Arial, sans-serif; }
    .field { font: 12px Consolas, "Liberation Mono", monospace; fill: #1f2937; }
    .meta { font: 12px "Segoe UI", Arial, sans-serif; fill: #64748b; }
    .section { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #334155; }
    .card { transition: opacity .12s ease; }
    .card-outline { transition: stroke .12s ease, stroke-width .12s ease; }
    .card.active-card .card-outline { stroke: #ef4444; stroke-width: 4; }
    .relation { cursor: pointer; }
    .overview-app { cursor: pointer; }
    .overview-app:hover .overview-outline { stroke-width: 4; }
    .edge-hit { stroke: transparent; stroke-width: 18; fill: none; pointer-events: stroke; }
    .edge { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); opacity: .62; }
    .external-edge { stroke: #475569; opacity: .58; }
    .relation.active .edge { stroke: #ef4444; stroke-width: 4; marker-end: url(#arrow-active); opacity: 1; }
    .relation.active .edge-label-bg { stroke: #ef4444; stroke-width: 1.5; opacity: 1; }
    .relation.active .edge-label { fill: #b91c1c; font-weight: 700; }
    .edge-label-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; opacity: .9; }
    .edge-label { font: 10px "Segoe UI", Arial, sans-serif; fill: #475569; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="60" y="54" class="page-title">django_admin_log Neighborhood</text>
  <text x="60" y="80" class="subtitle">1 parent/lookup tables, 0 child tables, 1 direct relationships</text>
  <text x="60" y="126" class="section">Parents and lookups</text>
  <g class="relation" data-src="django_content_type" data-dst="django_admin_log" data-label="content_type_id">
    <title>django_content_type to django_admin_log via content_type_id</title>
    <path class="edge-hit" d="M 320 206 L 338 206 L 338 360 L 500 360"/>
    <path class="edge" d="M 320 206 L 338 206 L 338 360 L 500 360"/>
    <rect class="edge-label-bg" x="287.0" y="347.0" width="102" height="16" rx="4"/>
    <text class="edge-label" x="338.0" y="359.0" text-anchor="middle">content_type_id</text>
  </g>
  <g id="django_content_type" class="card" data-table="django_content_type">
    <title>django_content_type</title>
    <rect class="card-outline" x="60" y="150" width="260" height="112" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="60" y="150" width="260" height="34" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="60" y="176" width="260" height="8" fill="#e2e8f0"/>
    <text x="74" y="172" class="card-title" fill="#94a3b8">django_content_type</text>
    <text x="306" y="172" class="meta" text-anchor="end">django</text>
    <text x="74" y="208" class="field">PK    id : int</text>
    <text x="74" y="226" class="field">      app_label : varchar</text>
    <text x="74" y="244" class="field">      model : varchar</text>
  </g>
  <g id="django_admin_log" class="card" data-table="django_admin_log">
    <title>django_admin_log</title>
    <rect class="card-outline" x="500" y="259" width="320" height="202" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <rect x="500" y="259" width="320" height="34" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1"/>
    <rect x="500" y="285" width="320" height="8" fill="#bfdbfe"/>
    <text x="514" y="281" class="card-title" fill="#0f172a">django_admin_log</text>
    <text x="514" y="317" class="field">PK    id : int</text>
    <text x="514" y="335" class="field">      action_time : datetime</text>
    <text x="514" y="353" class="field">      object_id : text (nullable)</text>
    <text x="514" y="371" class="field">      object_repr : varchar</text>
    <text x="514" y="389" class="field">      action_flag : int</text>
    <text x="514" y="407" class="field">      change_message : text</text>
    <text x="514" y="425" class="field">FK    content_type_id : int (nullable)</text>
    <text x="514" y="443" class="field">      user_id : int</text>
  </g>

  <script><![CDATA[
    (function () {
      const svg = document.currentScript.ownerSVGElement;
      if (!svg || svg.dataset.erInteractive === "1") return;
      svg.dataset.erInteractive = "1";
      const relations = Array.from(svg.querySelectorAll(".relation"));
      const cards = Array.from(svg.querySelectorAll(".card"));

      function clear() {
        relations.forEach((relation) => relation.classList.remove("active"));
        cards.forEach((card) => card.classList.remove("active-card"));
      }

      function highlight(relation) {
        const src = relation.dataset.src;
        const dst = relation.dataset.dst;
        relations.forEach((item) => {
          item.classList.toggle("active", item === relation);
        });
        cards.forEach((card) => {
          const connected = card.dataset.table === src || card.dataset.table === dst;
          card.classList.toggle("active-card", connected);
        });
      }

      relations.forEach((relation) => {
        relation.addEventListener("click", (event) => {
          event.stopPropagation();
          highlight(relation);
        });
      });
      svg.addEventListener("click", clear);
    })();
  ]]></script>

</svg>
