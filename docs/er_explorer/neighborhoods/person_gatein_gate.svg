    <path class="edge-hit" d="M 820 338 L 838 338 L 838 223 L 1000 223"/>
    <path class="edge" d="M 820 338 L 838 338 L 838 223 L 1000 223"/>
    <rect class="edge-label-bg" x="816.5" y="215.0" width="72" height="16" rx="4"/>
