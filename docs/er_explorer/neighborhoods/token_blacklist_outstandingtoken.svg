<svg xmlns="http://www.w3.org/2000/svg" width="1330" height="720" viewBox="0 0 1330 720">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <style>
    .page-title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #475569; }
    .card-title { font: 700 15px "Segoe UI", Arial, sans-serif; }
    .field { font: 12px Consolas, "Liberation Mono", monospace; fill: #1f2937; }
    .meta { font: 12px "Segoe UI", Arial, sans-serif; fill: #64748b; }
    .section { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #334155; }
    .card { transition: opacity .12s ease; }
    .card-outline { transition: stroke .12s ease, stroke-width .12s ease; }
    .card.active-card .card-outline { stroke: #ef4444; stroke-width: 4; }
    .relation { cursor: pointer; }
    .overview-app { cursor: pointer; }
    .overview-app:hover .overview-outline { stroke-width: 4; }
    .edge-hit { stroke: transparent; stroke-width: 18; fill: none; pointer-events: stroke; }
    .edge { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); opacity: .62; }
    .external-edge { stroke: #475569; opacity: .58; }
    .relation.active .edge { stroke: #ef4444; stroke-width: 4; marker-end: url(#arrow-active); opacity: 1; }
    .relation.active .edge-label-bg { stroke: #ef4444; stroke-width: 1.5; opacity: 1; }
    .relation.active .edge-label { fill: #b91c1c; font-weight: 700; }
    .edge-label-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; opacity: .9; }
    .edge-label { font: 10px "Segoe UI", Arial, sans-serif; fill: #475569; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="60" y="54" class="page-title">token_blacklist_outstandingtoken Neighborhood</text>
  <text x="60" y="80" class="subtitle">0 parent/lookup tables, 1 child tables, 1 direct relationships</text>
  <text x="1000" y="126" class="section">Children and dependents</text>
  <g class="relation" data-src="token_blacklist_outstandingtoken" data-dst="token_blacklist_blacklistedtoken" data-label="token_id">
    <title>token_blacklist_outstandingtoken to token_blacklist_blacklistedtoken via token_id</title>
    <path class="edge-hit" d="M 820 360 L 838 360 L 838 206 L 1000 206"/>
    <path class="edge" d="M 820 360 L 838 360 L 838 206 L 1000 206"/>
    <rect class="edge-label-bg" x="808.0" y="203.0" width="60" height="16" rx="4"/>
    <text class="edge-label" x="838.0" y="215.0" text-anchor="middle">token_id</text>
  </g>
  <g id="token_blacklist_outstandingtoken" class="card" data-table="token_blacklist_outstandingtoken">
    <title>token_blacklist_outstandingtoken</title>
    <rect class="card-outline" x="500" y="277" width="320" height="166" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <rect x="500" y="277" width="320" height="34" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1"/>
    <rect x="500" y="303" width="320" height="8" fill="#bfdbfe"/>
    <text x="514" y="299" class="card-title" fill="#0f172a">token_blacklist_outstandingtoken</text>
    <text x="514" y="335" class="field">PK    id : bigint</text>
    <text x="514" y="353" class="field">      token : text</text>
    <text x="514" y="371" class="field">      created_at : datetime (nullable)</text>
    <text x="514" y="389" class="field">      expires_at : datetime</text>
    <text x="514" y="407" class="field">      user_id : int (nullable)</text>
    <text x="514" y="425" class="field">UK    jti : varchar</text>
  </g>
  <g id="token_blacklist_blacklistedtoken" class="card" data-table="token_blacklist_blacklistedtoken">
    <title>token_blacklist_blacklistedtoken</title>
    <rect class="card-outline" x="1000" y="150" width="260" height="112" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="1000" y="150" width="260" height="34" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="1000" y="176" width="260" height="8" fill="#e2e8f0"/>
    <text x="1014" y="172" class="card-title" fill="#94a3b8">token_blacklist_blacklistedtoken</text>
    <text x="1246" y="172" class="meta" text-anchor="end">token_blacklist</text>
    <text x="1014" y="208" class="field">PK    id : bigint</text>
    <text x="1014" y="226" class="field">      blacklisted_at : datetime</text>
    <text x="1014" y="244" class="field">FK/UK token_id : bigint</text>
  </g>

  <script><![CDATA[
    (function () {
      const svg = document.currentScript.ownerSVGElement;
      if (!svg || svg.dataset.erInteractive === "1") return;
      svg.dataset.erInteractive = "1";
      const relations = Array.from(svg.querySelectorAll(".relation"));
      const cards = Array.from(svg.querySelectorAll(".card"));

      function clear() {
        relations.forEach((relation) => relation.classList.remove("active"));
        cards.forEach((card) => card.classList.remove("active-card"));
      }

      function highlight(relation) {
        const src = relation.dataset.src;
        const dst = relation.dataset.dst;
        relations.forEach((item) => {
          item.classList.toggle("active", item === relation);
        });
        cards.forEach((card) => {
          const connected = card.dataset.table === src || card.dataset.table === dst;
          card.classList.toggle("active-card", connected);
        });
      }

      relations.forEach((relation) => {
        relation.addEventListener("click", (event) => {
          event.stopPropagation();
          highlight(relation);
        });
      });
      svg.addEventListener("click", clear);
    })();
  ]]></script>

</svg>
