<svg xmlns="http://www.w3.org/2000/svg" width="1079" height="720" viewBox="0 0 1079 720">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <style>
    .page-title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #475569; }
    .card-title { font: 700 15px "Segoe UI", Arial, sans-serif; }
    .field { font: 12px Consolas, "Liberation Mono", monospace; fill: #1f2937; }
    .meta { font: 12px "Segoe UI", Arial, sans-serif; fill: #64748b; }
    .section { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #334155; }
    .card { transition: opacity .12s ease; }
    .card-outline { transition: stroke .12s ease, stroke-width .12s ease; }
    .card.active-card .card-outline { stroke: #ef4444; stroke-width: 4; }
    .relation { cursor: pointer; }
    .overview-app { cursor: pointer; }
    .overview-app:hover .overview-outline { stroke-width: 4; }
    .edge-hit { stroke: transparent; stroke-width: 18; fill: none; pointer-events: stroke; }
    .edge { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); opacity: .62; }
    .external-edge { stroke: #475569; opacity: .58; }
    .relation.active .edge { stroke: #ef4444; stroke-width: 4; marker-end: url(#arrow-active); opacity: 1; }
    .relation.active .edge-label-bg { stroke: #ef4444; stroke-width: 1.5; opacity: 1; }
    .relation.active .edge-label { fill: #b91c1c; font-weight: 700; }
    .edge-label-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; opacity: .9; }
    .edge-label { font: 10px "Segoe UI", Arial, sans-serif; fill: #475569; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="60" y="54" class="page-title">database_connections_databaseconnection Neighborhood</text>
  <text x="60" y="80" class="subtitle">0 parent/lookup tables, 0 child tables, 0 direct relationships</text>

  <g id="database_connections_databaseconnection" class="card" data-table="database_connections_databaseconnection">
    <title>database_connections_databaseconnection</title>
    <rect class="card-outline" x="500" y="150" width="329" height="436" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <rect x="500" y="150" width="329" height="34" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1"/>
    <rect x="500" y="176" width="329" height="8" fill="#bfdbfe"/>
    <text x="514" y="172" class="card-title" fill="#0f172a">database_connections_databaseconnection</text>
    <text x="514" y="208" class="field">PK    id : bigint</text>
    <text x="514" y="226" class="field">UK    key : varchar</text>
    <text x="514" y="244" class="field">      name : varchar</text>
    <text x="514" y="262" class="field">      database_type : varchar</text>
    <text x="514" y="280" class="field">      environment : varchar</text>
    <text x="514" y="298" class="field">      host : varchar</text>
    <text x="514" y="316" class="field">      port : int</text>
    <text x="514" y="334" class="field">      database_name : varchar</text>
    <text x="514" y="352" class="field">      schema_name : varchar</text>
    <text x="514" y="370" class="field">      username : varchar</text>
    <text x="514" y="388" class="field">      password_secret_key : varchar</text>
    <text x="514" y="406" class="field">      pool_min_size : int</text>
    <text x="514" y="424" class="field">      pool_max_size : int</text>
    <text x="514" y="442" class="field">      connect_timeout_seconds : int</text>
    <text x="514" y="460" class="field">      options : json</text>
    <text x="514" y="478" class="field">      is_active : boolean</text>
    <text x="514" y="496" class="field">      last_health_status : varchar</text>
    <text x="514" y="514" class="field">      last_health_error : text</text>
    <text x="514" y="532" class="field">      last_checked_at : datetime (nullable)</text>
    <text x="514" y="550" class="field">      created_at : datetime</text>
    <text x="514" y="568" class="field">      updated_at : datetime</text>
  </g>

  <script><![CDATA[
    (function () {
      const svg = document.currentScript.ownerSVGElement;
      if (!svg || svg.dataset.erInteractive === "1") return;
      svg.dataset.erInteractive = "1";
      const relations = Array.from(svg.querySelectorAll(".relation"));
      const cards = Array.from(svg.querySelectorAll(".card"));

      function clear() {
        relations.forEach((relation) => relation.classList.remove("active"));
        cards.forEach((card) => card.classList.remove("active-card"));
      }

      function highlight(relation) {
        const src = relation.dataset.src;
        const dst = relation.dataset.dst;
        relations.forEach((item) => {
          item.classList.toggle("active", item === relation);
        });
        cards.forEach((card) => {
          const connected = card.dataset.table === src || card.dataset.table === dst;
          card.classList.toggle("active-card", connected);
        });
      }

      relations.forEach((relation) => {
        relation.addEventListener("click", (event) => {
          event.stopPropagation();
          highlight(relation);
        });
      });
      svg.addEventListener("click", clear);
    })();
  ]]></script>

</svg>
