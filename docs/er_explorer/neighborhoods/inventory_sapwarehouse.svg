    <rect x="60" y="176" width="308" height="8" fill="#e2e8f0"/>
    <text x="74" y="172" class="card-title" fill="#94a3b8">inventory_sapcompany</text>
    <text x="354" y="172" class="meta" text-anchor="end">inventory</text>
