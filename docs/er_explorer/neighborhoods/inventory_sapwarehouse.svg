    <text x="74" y="262" class="field">      label : varchar</text>
    <text x="74" y="280" class="field">UK    database : varchar</text>
    <text x="74" y="298" class="field">      hana_ok : boolean</text>
    <text x="74" y="316" class="field">      last_seen_at : datetime (nullable)</text>
    <text x="74" y="334" class="field">      created_at : datetime</text>
    <text x="74" y="352" class="field">... 1 more fields</text>
  </g>
  <g id="inventory_sapwarehouse" class="card" data-table="inventory_sapwarehouse">
    <title>inventory_sapwarehouse</title>
    <rect class="card-outline" x="548" y="178" width="320" height="364" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <rect x="548" y="178" width="320" height="34" rx="8" fill="#bfdbfe" stroke="#0f172a" stroke-width="1"/>
    <rect x="548" y="204" width="320" height="8" fill="#bfdbfe"/>
    <text x="562" y="200" class="card-title" fill="#0f172a">inventory_sapwarehouse</text>
    <text x="562" y="236" class="field">PK    id : bigint</text>
    <text x="562" y="254" class="field">      warehouse_code : varchar</text>
    <text x="562" y="272" class="field">      warehouse_name : varchar</text>
    <text x="562" y="290" class="field">      city : varchar</text>
    <text x="562" y="308" class="field">      state : varchar</text>
    <text x="562" y="326" class="field">      country : varchar</text>
    <text x="562" y="344" class="field">      inactive : varchar</text>
