    <path class="edge-hit" d="M 368 260 L 386 260 L 386 360 L 548 360"/>
    <path class="edge" d="M 368 260 L 386 260 L 386 360 L 548 360"/>
    <rect class="edge-label-bg" x="372.0" y="352.0" width="72" height="16" rx="4"/>
    <text class="edge-label" x="408.0" y="364.0" text-anchor="middle">company_id</text>
  </g>
  <g id="inventory_sapcompany" class="card" data-table="inventory_sapcompany">
